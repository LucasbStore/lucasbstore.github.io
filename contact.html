<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Iron Blog</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial', sans-serif; }
        body { background-color: #121212; color: #f4f4f4; line-height: 1.6; }
        header { background-color: #000; padding: 25px; text-align: center; border-bottom: 4px solid #ffcc00; }
        header h1 { color: #ffcc00; font-size: 2.8rem; text-transform: uppercase; letter-spacing: 3px; font-weight: 800; }
        header a { text-decoration: none; color: inherit; }
        .content-container { max-width: 600px; margin: 40px auto; padding: 30px; background-color: #1a1a1a; border-radius: 12px; border: 1px solid #333; }
        h2 { color: #ffcc00; margin-bottom: 10px; text-transform: uppercase; text-align: center; }
        p.subtitle { text-align: center; color: #aaa; margin-bottom: 30px; }
        
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; color: #ccc; font-weight: 600; }
        .input-group input, .input-group textarea { width: 100%; padding: 15px; border-radius: 6px; background-color: #222; color: #fff; border: 1px solid #444; }
        .input-group input:focus, .input-group textarea:focus { border-color: #ffcc00; outline: none; }
        
        button { background-color: #ffcc00; color: #000; border: none; padding: 15px; font-size: 1.1rem; font-weight: 800; cursor: pointer; border-radius: 6px; text-transform: uppercase; width: 100%; transition: 0.3s;}
        button:hover { background-color: #e6b800; }
        
        .back-btn { display: inline-block; margin-bottom: 20px; color: #ffcc00; text-decoration: none; font-weight: bold; }
        .back-btn:hover { text-decoration: underline; }
        footer { text-align: center; padding: 20px; background-color: #000; color: #555; margin-top: 40px; }
    </style>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3672902212320535"
     crossorigin="anonymous"></script>
</head>
<body>

    <header>
        <a href="index.html"><h1>Iron Blog</h1></a>
    </header>

    <div class="content-container">
        <a href="index.html" class="back-btn">← Back to Home</a>
        <h2>Contact Us</h2>
        <p class="subtitle">Have a question about our supplements or training programs? Send us a message.</p>
        
        <form action="https://formsubmit.co/lucasbidutti2012@gmail.com" method="POST">
            <input type="text" name="_honey" style="display:none">
            <input type="hidden" name="_captcha" value="false">
            
            <div class="input-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Your Name" required>
            </div>
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Your Email Address" required>
            </div>
            <div class="input-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" rows="5" placeholder="How can we help you?" required></textarea>
            </div>
            <button type="submit">Send Message</button>
        </form>
    </div>

    <footer>
        <p>&copy; 2026 Iron Blog. Official Products by Distributor LucasBrStore.</p>
    </footer>

</body>
</html>
